[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "partyboxd"
version = "0.1.0-dev"
description = "Headless daemon exposing a stable HTTP API for PartyBox speakers"
readme = "README.md"
license = { file = "../../LICENSE" }
authors = [{ name = "Jonathan Klingberg" }]
requires-python = ">=3.11"
keywords = ["jbl", "partybox", "smart-speaker", "spotify", "airplay", "appliance"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Environment :: No Input/Output (Daemon)",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Home Automation",
    "Topic :: Multimedia :: Sound/Audio",
    "Typing :: Typed",
]

dependencies = [
    # Bluetooth SDK (workspace dependency)
    "partybox",
    # HTTP server and REST API
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    # Configuration
    "pydantic-settings>=2.2",
    # Structured logging
    "structlog>=24.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "httpx>=0.27",        # FastAPI async test client
    "mypy>=1.10",
    "ruff>=0.4",
]

[tool.uv.sources]
partybox = { workspace = true }

[project.scripts]
partyboxd = "partyboxd.__main__:main"

[project.urls]
Homepage = "https://github.com/jklingberg/partybox-companion"
Repository = "https://github.com/jklingberg/partybox-companion"
Issues = "https://github.com/jklingberg/partybox-companion/issues"
Changelog = "https://github.com/jklingberg/partybox-companion/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/partyboxd"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["--cov=partyboxd"]

[tool.mypy]
mypy_path = "src"
