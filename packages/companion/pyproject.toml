[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "partybox-companion"
dynamic = ["version"]
description = "Turn any PartyBox into a true WiFi speaker — full appliance package"
readme = "README.md"
license = { file = "../../LICENSE" }
authors = [{ name = "Jonathan Klingberg" }]
requires-python = ">=3.14"
keywords = ["partybox", "smart-speaker", "spotify", "airplay", "appliance", "raspberry-pi"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Environment :: No Input/Output (Daemon)",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Topic :: Home Automation",
    "Topic :: Multimedia :: Sound/Audio",
    "Typing :: Typed",
]

dependencies = [
    # Daemon (workspace dependency)
    "partyboxd",
    # Portal configuration
    "pydantic-settings>=2.2",
    # BlueZ D-Bus API (PairingService) — already a transitive dependency via
    # partybox -> bleak; declared directly since companion now calls it itself.
    "dbus-fast>=4.0",
    # GitHub SSH-key import (SshAccessService.fetch_github_keys, ADR-042).
    # Previously a dev-only dependency (FastAPI's async TestClient); now used
    # at runtime too, so it moved up from the `dev` extra below.
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=1.0",
    "pytest-cov>=5.0",
    "mypy>=2.0",
    "ruff>=0.15",
]

[tool.uv.sources]
partyboxd = { workspace = true }

[project.scripts]
# Full appliance entry point (starts daemon + companion services)
partybox-companion = "companion.__main__:main"

[project.urls]
Homepage = "https://github.com/jklingberg/partybox-companion"
Repository = "https://github.com/jklingberg/partybox-companion"
Issues = "https://github.com/jklingberg/partybox-companion/issues"
Changelog = "https://github.com/jklingberg/partybox-companion/blob/main/CHANGELOG.md"

[tool.hatch.version]
source = "vcs"
fallback-version = "0.0.0.dev0"

[tool.hatch.build.targets.wheel]
packages = ["src/companion"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = ["--cov=companion"]

[tool.mypy]
mypy_path = "src"
