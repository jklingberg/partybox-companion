# Hooks that run Python source (debug-statements, mypy) need an interpreter
# that can parse this project's syntax — e.g. PEP 758 unparenthesized except
# clauses, valid only from 3.14. Without this pin, pre-commit falls back to
# whatever ambient python3 was on PATH when hook environments were first
# created, which can predate a Python bump and fail with "Could not parse ast".
default_language_version:
  python: python3.14

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        # Type-check package sources only — mirrors CI, which runs mypy on
        # each package's src/. Excludes tests/ (whose per-package __init__.py
        # files otherwise collide as duplicate "tests" modules).
        exclude: ^packages/[^/]+/tests/
        additional_dependencies:
          - pydantic-settings>=2.2
          - fastapi>=0.100
          - dbus-fast>=4.0
        args: [--ignore-missing-imports]
