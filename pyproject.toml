[tool.uv.workspace]
members = ["packages/*"]

# ---------------------------------------------------------------------------
# Shared tool configuration — applies to all packages in the workspace
# ---------------------------------------------------------------------------

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ANN", # flake8-annotations
    "S",   # flake8-bandit (security)
    "RUF", # ruff-specific
]
ignore = [
    "S101",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN", "S"]
# spike/ is exploratory M3 viability code that drives system CLIs (bluetoothctl,
# pw-*) and crosses JSON/event boundaries; the bandit subprocess warnings
# (S603/S607) and ANN401 (Any) are noise there.
"spike/**" = ["S", "ANN401"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = ["--cov-report=term-missing", "--cov-report=xml"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "\\.\\.\\.",
]
