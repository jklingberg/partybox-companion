# Wildcard DNS for the provisioning captive portal.
#
# NetworkManager's internal dnsmasq instance (started when ipv4.method=shared)
# reads drop-in files from this directory. This entry resolves every hostname
# to the AP gateway so that any URL the user types — or that the OS probes
# for captive portal detection — lands on the Companion Portal at 10.42.0.1.
#
# address=/#/... is a dnsmasq wildcard: the "#" matches all domains.
address=/#/10.42.0.1
