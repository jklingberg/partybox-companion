[Unit]
# Ensure WirePlumber starts after bluetooth.service so the hci0 adapter is
# fully ready when WirePlumber tries to register A2DP media endpoints.
# Without this, WirePlumber races BlueZ on boot, fails to register endpoints
# silently, and bluetoothctl connect then fails with br-connection-profile-unavailable.
After=bluetooth.service
Wants=bluetooth.service
