# /etc/NetworkManager/conf.d/wifi-powersave-off.conf
# Disable WiFi power management on the appliance.
#
# The BCM43438 (Pi 3 B+) shares a single 2.4 GHz radio between WiFi and
# Bluetooth A2DP. When power management is active the driver aggressively
# sleeps the radio, which causes mDNS packets to be dropped during streaming.
# Disabling PM keeps the radio awake so partybox.local stays reachable.
#
# powersave = 2 means "disable" in NetworkManager's scheme.
# See: man 5 NetworkManager.conf, section [connection], key wifi.powersave.

[connection]
wifi.powersave = 2
