[Login]
# Allow non-pi users (specifically the companion service account) to traverse
# /run/user/1000/ so that librespot can reach the PipeWire-pulse socket at
# /run/user/1000/pulse/native.  The default 0700 blocks companion entirely.
# companion.service also has an ExecStartPre chmod as belt-and-suspenders.
UserRuntimeDirectoryMode=0755
