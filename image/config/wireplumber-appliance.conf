## Appliance Bluetooth audio overrides for WirePlumber 0.5.x.
##
## Layered on top of /usr/share/wireplumber/wireplumber.conf via the
## /etc/wireplumber/wireplumber.conf.d/ overlay directory. Ported from the
## WirePlumber 0.4.x Lua rule format (image/config/wireplumber-appliance.lua,
## removed) when the appliance moved to wireplumber 0.5.x — see ADR-028
## addendum "WirePlumber/PipeWire version skew". 0.5.x reads monitor rules as
## native SPA-JSON, not Lua tables; monitors/bluez.lua loads this section via
## Conf.get_section_as_json("monitor.bluez.rules", ...).
##
## Deployed by install.sh to:
##   /etc/wireplumber/wireplumber.conf.d/51-appliance.conf

monitor.bluez.rules = [
  # Disable AVRCP hardware-volume mirroring for all Bluetooth cards.
  #
  # By default WirePlumber syncs the PipeWire node volume with the value the
  # speaker reports via AVRCP (the physical knob position). On the appliance
  # the knob may be at any position; the result is that PipeWire applies
  # unwanted software attenuation (e.g. 0.16 when the knob is near minimum)
  # on top of what librespot already controls via the PulseAudio API.
  # Disabling hw-volume lets librespot own the full volume range.
  {
    matches = [
      { device.name = "~bluez_card.*" }
    ]
    actions = {
      update-props = {
        bluez5.hw-volume = []
      }
    }
  }

  # Keep Bluetooth sink nodes running even when no client is playing audio.
  #
  # PipeWire's default is to suspend idle nodes after a few seconds of
  # silence. For a Bluetooth A2DP sink, suspension tears down the AVDTP
  # stream; the next connect attempt then requires a full A2DP
  # re-establishment which the JBL speaker sometimes rejects.
  # node.pause-on-idle = false keeps the transport alive across track gaps,
  # Spotify queue pauses, and librespot idle periods.
  {
    matches = [
      { node.name = "~bluez_output.*" }
    ]
    actions = {
      update-props = {
        node.pause-on-idle = false
        node.volume        = 1.0
      }
    }
  }
]
