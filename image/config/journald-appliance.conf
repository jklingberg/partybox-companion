[Journal]
# Keep logs in RAM only — eliminate continuous journal writes to the SD card.
# The journal is available for the current boot via journalctl but is lost on
# reboot. For an appliance updated by image replacement rather than in-place
# packages, losing logs on reboot is an acceptable trade-off.
#
# If persistent post-reboot logs are required (e.g. for remote diagnosis),
# add a drop-in that overrides Storage=persistent and ensure log rotation is
# configured so the journal does not grow unboundedly on the SD card.
Storage=volatile

# Cap in-RAM journal size. /run is tmpfs-backed; a runaway logging process
# must not exhaust it.
RuntimeMaxUse=50M
