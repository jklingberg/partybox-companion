[Service]
# Run WirePlumber with the "main-embedded" profile instead of the default
# "main". main-embedded disables logind seat-monitoring (and other
# desktop-session-only features) — see ADR-028 addendum "WirePlumber/PipeWire
# version skew".
#
# Without this, WirePlumber 0.5.x's bluez5 monitor
# (scripts/monitors/bluez.lua) only activates while logind reports the seat
# as "active". On this headless appliance the seat state cycles between
# "online" and "closing" and never reaches "active", so the bluez5 monitor
# is created and torn down in a rapid loop — flapping every registered A2DP
# endpoint roughly once a second and leaving audio_ready permanently false.
ExecStart=
ExecStart=/usr/bin/wireplumber -p main-embedded
