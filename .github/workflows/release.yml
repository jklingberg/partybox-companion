name: Release

# Triggered by a version tag (e.g. v1.0.0 or v1.0.0-rc.1).
# Runs the full CI suite, then builds a Raspberry Pi OS appliance image and
# publishes a draft GitHub Release containing the compressed image.
#
# After the workflow completes, review and publish the draft release manually.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Gate: full CI suite must pass before the image build starts
  # ─────────────────────────────────────────────────────────────────────────
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ─────────────────────────────────────────────────────────────────────────
  # Image build: customize Raspberry Pi OS Lite ARM64 in QEMU via
  # arm-runner-action, then compress and publish the result.
  # ─────────────────────────────────────────────────────────────────────────
  build-image:
    name: Build Appliance Image
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create the GitHub Release

    steps:
      # fetch-depth: 0 fetches all history and tags so hatch-vcs can derive
      # the package version from the git tag (e.g. v1.0.0 → 1.0.0).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Derive artifact names from the tag (e.g. v1.0.0)
      - name: Resolve release metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BASE="partybox-companion-${VERSION}"
          echo "version=${VERSION}"          >> "$GITHUB_OUTPUT"
          echo "image=${BASE}.img"           >> "$GITHUB_OUTPUT"
          echo "artifact=${BASE}.img.xz"    >> "$GITHUB_OUTPUT"

      # Load the pinned base image URL from image/config/base-image.env.
      # Keeping the URL in a dedicated file makes upgrades a single, reviewable diff.
      - name: Load base image configuration
        id: base_image
        run: |
          set -a
          source image/config/base-image.env
          set +a
          echo "url=${PI_OS_URL}"         >> "$GITHUB_OUTPUT"
          echo "version=${PI_OS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=${PI_OS_NAME}"       >> "$GITHUB_OUTPUT"

      # Boot Pi OS Lite ARM64 in QEMU, copy the repository in, run install.sh,
      # then run the smoke test before the image is finalised.
      # image_additional_mb: extra space beyond the base image (~1.8 GB) for
      # the Python venv, librespot, and apt packages.
      - name: Build and smoke-test Pi OS image
        uses: pguyot/arm-runner-action@v2
        id: build
        with:
          base_image: ${{ steps.base_image.outputs.url }}
          image_additional_mb: 3000
          copy_repository_path: /opt/partybox-src
          commands: |
            # Copy smoke-test.sh before install.sh removes /opt/partybox-src.
            cp /opt/partybox-src/image/smoke-test.sh /tmp/partybox-smoke-test.sh

            # cd away from /opt/partybox-src so the shell's CWD remains valid
            # after install.sh deletes the source tree (avoids getcwd errors).
            cd /

            PARTYBOX_SRC_DIR=/opt/partybox-src \
            COMPANION_VERSION=${{ steps.meta.outputs.version }} \
              bash /opt/partybox-src/image/install.sh

            # Smoke test: verify the appliance starts and serves its health API.
            # A non-zero exit here aborts the workflow before the image is published.
            bash /tmp/partybox-smoke-test.sh
            rm -f /tmp/partybox-smoke-test.sh

      # Rename to the versioned filename, then compress.
      # xz -T0 uses all available cores.
      - name: Compress image
        run: |
          mv "${{ steps.build.outputs.image }}" "${{ steps.meta.outputs.image }}"
          xz -T0 "${{ steps.meta.outputs.image }}"

      # Publish a draft release so the release manager can review before
      # making the image publicly visible.
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PartyBox Companion ${{ steps.meta.outputs.version }}"
          draft: true
          generate_release_notes: true
          files: "${{ steps.meta.outputs.artifact }}"
          body: |
            ## Installation

            1. Download `${{ steps.meta.outputs.artifact }}`
            2. Flash it to a microSD card with [Raspberry Pi Imager](https://www.raspberrypi.com/software/)
               (**OS** → Use Custom → select the downloaded file)
            3. Insert the card and power on your Raspberry Pi

            Full walkthrough — WiFi setup, opening the Portal, and pairing your
            speaker — in [docs/installation.md](https://github.com/jklingberg/partybox-companion/blob/main/docs/installation.md).

            ### Requirements

            - Raspberry Pi 3 B+ or newer
            - MicroSD card — 8 GB minimum, 16 GB recommended
            - JBL PartyBox speaker (PartyBox 520 is the only model currently tested)
            - 2.4 GHz or 5 GHz WiFi network

            ---

            See the [contributor guide](https://github.com/jklingberg/partybox-companion/blob/main/CONTRIBUTING.md)
            and [image build documentation](https://github.com/jklingberg/partybox-companion/blob/main/image/README.md)
            for details.
