name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}  # Called from release.yml before the image build

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install workspace
        run: uv sync --all-extras
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install workspace
        run: uv sync --all-extras
      - name: mypy — partybox
        run: uv run mypy src/
        working-directory: packages/partybox
      - name: mypy — partyboxd
        run: uv run mypy src/
        working-directory: packages/partyboxd
      - name: mypy — companion
        run: uv run mypy src/
        working-directory: packages/companion

  test:
    name: Test ${{ matrix.package }} (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
        package: [partybox, partyboxd, companion]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install workspace
        run: uv sync --all-extras
      - name: Run tests
        run: uv run pytest -m "not hardware"
        working-directory: packages/${{ matrix.package }}
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: packages/${{ matrix.package }}/coverage.xml
          flags: ${{ matrix.package }}
          fail_ci_if_error: false
